name: Build JHDF5 natives and jar

on:
  workflow_dispatch:
    inputs:
      native_cache_version:
        description: "Manual cache/artifact version for native payloads and packaged jars. Bump to force rebuild."
        required: false
        default: "v1"
      force_native_rebuild:
        description: "Ignore restored native caches and rebuild all native payloads."
        type: boolean
        required: false
        default: false
  push:
    branches: [master, main, jvm-sfx-native]
  release:
    types: [published]

permissions:
  contents: write
  actions: read

concurrency:
  group: jhdf5-native-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.native_cache_version || 'v1' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HDF5_VERSION: "1.10.11"
  HDF5_CMAKE_ARCHIVE_URL: https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.10/hdf5-1.10.11/src/CMake-hdf5-1.10.11.zip
  HDF5_CMAKE_ARCHIVE_NAME: CMake-hdf5-1.10.11.zip
  JHDF5_NATIVE_CACHE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.native_cache_version || 'v1' }}
  JHDF5_FORCE_NATIVE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_native_rebuild || false }}

jobs:
  linux-amd64:
    name: Linux amd64 natives
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Restore Linux amd64 native cache
        id: native-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            libs/native/jhdf5/amd64-Linux
            libs/native/jhdf5/amd64-Linux-generic
            libs/native/jhdf5/amd64-Linux-avx2
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-linux-amd64-hdf5-${{ env.HDF5_VERSION }}
      - name: Download HDF5 CMake archive
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build Linux amd64 variants
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: ./source/c/build_linux_manylinux.sh amd64 generic avx2
      - name: Smoke-check native payload
        run: |
          test -f libs/native/jhdf5/amd64-Linux/libjhdf5.so
          test -f libs/native/jhdf5/amd64-Linux-avx2/libjhdf5.so
      - name: Save Linux amd64 native cache
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            libs/native/jhdf5/amd64-Linux
            libs/native/jhdf5/amd64-Linux-generic
            libs/native/jhdf5/amd64-Linux-avx2
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-linux-amd64-hdf5-${{ env.HDF5_VERSION }}
      - name: Upload Linux amd64 generic native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-linux-amd64-generic-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: |
            libs/native/jhdf5/amd64-Linux/**
            libs/native/jhdf5/amd64-Linux-generic/**
          if-no-files-found: error
      - name: Upload Linux amd64 avx2 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-linux-amd64-avx2-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: libs/native/jhdf5/amd64-Linux-avx2/**
          if-no-files-found: error
      - name: Run Linux amd64 HDF5 tests
        id: linux-amd64-tests
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        shell: bash
        working-directory: source/c
        continue-on-error: true
        run: |
          TEST_DIR="$(find . -type d \( -path '*/hdf5-1.10.11*/build110/hict-StdShar-GNUC*' -o -path '*/hdf5-1.10.11*/build110/ci-StdShar-GNUC*' \) | sort | head -n 1)"
          if [[ -z "${TEST_DIR}" ]]; then
            echo "::warning::Linux amd64 HDF5 test directory was not found; skipping tests."
            exit 0
          fi
          ctest --test-dir "${TEST_DIR}" --output-on-failure
      - name: Linux amd64 HDF5 test warnings
        if: always() && steps.linux-amd64-tests.outcome == 'failure'
        run: echo "::warning::Linux amd64 HDF5 tests failed; native binaries were still built and uploaded."

  linux-arm64:
    name: Linux arm64 natives
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Restore Linux arm64 native cache
        id: native-cache
        uses: actions/cache/restore@v5
        with:
          path: libs/native/jhdf5/arm64-Linux
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-linux-arm64-hdf5-${{ env.HDF5_VERSION }}
      - name: Download HDF5 CMake archive
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build Linux arm64 payload
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: ./source/c/build_linux_manylinux.sh arm64
      - name: Smoke-check native payload
        run: test -f libs/native/jhdf5/arm64-Linux/libjhdf5.so
      - name: Save Linux arm64 native cache
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        uses: actions/cache/save@v5
        with:
          path: libs/native/jhdf5/arm64-Linux
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-linux-arm64-hdf5-${{ env.HDF5_VERSION }}
      - name: Upload Linux arm64 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-linux-arm64-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: libs/native/jhdf5/arm64-Linux/**
          if-no-files-found: error
      - name: Run Linux arm64 HDF5 tests
        id: linux-arm64-tests
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        shell: bash
        working-directory: source/c
        continue-on-error: true
        run: |
          TEST_DIR="$(find . -type d \( -path '*/hdf5-1.10.11*/build110/hict-StdShar-GNUC*' -o -path '*/hdf5-1.10.11*/build110/ci-StdShar-GNUC*' \) | sort | head -n 1)"
          if [[ -z "${TEST_DIR}" ]]; then
            echo "::warning::Linux arm64 HDF5 test directory was not found; skipping tests."
            exit 0
          fi
          ctest --test-dir "${TEST_DIR}" --output-on-failure
      - name: Linux arm64 HDF5 test warnings
        if: always() && steps.linux-arm64-tests.outcome == 'failure'
        run: echo "::warning::Linux arm64 HDF5 tests failed; native binaries were still built and uploaded."

  windows-amd64:
    name: Windows amd64 natives
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Restore Windows amd64 native cache
        id: native-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            libs/native/jhdf5/amd64-Windows
            libs/native/jhdf5/amd64-Windows-generic
            libs/native/jhdf5/amd64-Windows-avx2
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-windows-amd64-hdf5-${{ env.HDF5_VERSION }}
      - name: Download HDF5 CMake archive
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        shell: pwsh
        working-directory: source\c
        run: Invoke-WebRequest -Uri $env:HDF5_CMAKE_ARCHIVE_URL -OutFile $env:HDF5_CMAKE_ARCHIVE_NAME
      - name: Check wrapper
        shell: pwsh
        run: |
          if (-not (Test-Path gradlew.bat)) { throw "gradlew.bat was not found." }
      - name: Build Windows amd64 variants
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        shell: pwsh
        working-directory: source\c
        run: .\build_windows_amd64_variants.ps1 -Variants generic,avx2 -RunTests:$false
      - name: Smoke-check Windows native payload
        shell: pwsh
        run: |
          if (-not (Test-Path 'libs\native\jhdf5\amd64-Windows\jhdf5.dll')) { throw 'amd64-Windows\jhdf5.dll missing' }
          if (-not (Test-Path 'libs\native\jhdf5\amd64-Windows-avx2\jhdf5.dll')) { throw 'amd64-Windows-avx2\jhdf5.dll missing' }
      - name: Save Windows amd64 native cache
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        uses: actions/cache/save@v5
        with:
          path: |
            libs/native/jhdf5/amd64-Windows
            libs/native/jhdf5/amd64-Windows-generic
            libs/native/jhdf5/amd64-Windows-avx2
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-windows-amd64-hdf5-${{ env.HDF5_VERSION }}
      - name: Upload Windows amd64 generic native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-windows-amd64-generic-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: |
            libs/native/jhdf5/amd64-Windows/**
            libs/native/jhdf5/amd64-Windows-generic/**
          if-no-files-found: error
      - name: Upload Windows amd64 avx2 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-windows-amd64-avx2-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: libs/native/jhdf5/amd64-Windows-avx2/**
          if-no-files-found: error
      - name: Run Windows amd64 HDF5 tests
        id: windows-amd64-tests
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        continue-on-error: true
        shell: pwsh
        working-directory: source\c
        run: .\run_windows_hdf5_tests.ps1 -Variants generic,avx2
      - name: Windows amd64 HDF5 test warnings
        if: always() && steps.windows-amd64-tests.outcome == 'failure'
        run: echo "::warning::Windows amd64 HDF5 tests failed; native binaries were still built and uploaded. Review logs for failures."

  macos-arm64:
    name: macOS arm64 natives
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Restore macOS arm64 native cache
        id: native-cache
        uses: actions/cache/restore@v5
        with:
          path: "libs/native/jhdf5/aarch64-Mac OS X"
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-macos-arm64-hdf5-${{ env.HDF5_VERSION }}
      - name: Install CMake and Fortran toolchain
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: |
          brew update
          brew install cmake gcc
          echo "$(brew --prefix gcc)/bin" >> "$GITHUB_PATH"
          gfortran_path="$(command -v gfortran || command -v gfortran-14 || true)"
          if [[ -z "${gfortran_path}" ]]; then
            echo "::error::gfortran was not found after installing gcc." >&2
            exit 1
          fi
          echo "FC=${gfortran_path}" >> "$GITHUB_ENV"
      - name: Download HDF5 CMake archive
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build macOS arm64 payload
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        working-directory: source/c
        run: |
          ./compile_hdf5_macosx_aarch64.sh
          ./compile_macosx_aarch64.sh
      - name: Smoke-check macOS arm64 native payload
        run: test -f "libs/native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib"
      - name: Save macOS arm64 native cache
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        uses: actions/cache/save@v5
        with:
          path: "libs/native/jhdf5/aarch64-Mac OS X"
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-macos-arm64-hdf5-${{ env.HDF5_VERSION }}
      - name: Upload macOS arm64 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-macos-arm64-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: "libs/native/jhdf5/aarch64-Mac OS X/**"
          if-no-files-found: error
      - name: Run macOS arm64 HDF5 tests
        id: macos-arm64-tests
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        shell: bash
        working-directory: source/c
        continue-on-error: true
        run: |
          TEST_DIR="$(find . -type d \( -path '*/hdf5-1.10.11*/build110/hict-StdShar-Clang*' -o -path '*/hdf5-1.10.11*/build110/ci-StdShar-Clang*' \) | sort | head -n 1)"
          if [[ -z "${TEST_DIR}" ]]; then
            echo "::warning::macOS arm64 HDF5 test directory was not found; skipping tests."
            exit 0
          fi
          ctest --test-dir "${TEST_DIR}" --output-on-failure
      - name: macOS arm64 HDF5 test warnings
        if: always() && steps.macos-arm64-tests.outcome == 'failure'
        run: echo "::warning::macOS arm64 HDF5 tests failed; native binary was still built and uploaded."

  macos-x86_64:
    name: macOS x86_64 natives
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Restore macOS x86_64 native cache
        id: native-cache
        uses: actions/cache/restore@v5
        with:
          path: "libs/native/jhdf5/x86_64-Mac OS X"
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-macos-x86_64-hdf5-${{ env.HDF5_VERSION }}
      - name: Install CMake and Fortran toolchain
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: |
          brew update
          brew install cmake gcc
          echo "$(brew --prefix gcc)/bin" >> "$GITHUB_PATH"
          gfortran_path="$(command -v gfortran || command -v gfortran-14 || true)"
          if [[ -z "${gfortran_path}" ]]; then
            echo "::error::gfortran was not found after installing gcc." >&2
            exit 1
          fi
          echo "FC=${gfortran_path}" >> "$GITHUB_ENV"
      - name: Download HDF5 CMake archive
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build macOS x86_64 payload
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        working-directory: source/c
        run: |
          ./compile_hdf5_macosx_x86_64.sh
          ./compile_macosx_x86_64.sh
      - name: Smoke-check macOS x86_64 native payload
        run: test -f "libs/native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib"
      - name: Save macOS x86_64 native cache
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        uses: actions/cache/save@v5
        with:
          path: "libs/native/jhdf5/x86_64-Mac OS X"
          key: jhdf5-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-macos-x86_64-hdf5-${{ env.HDF5_VERSION }}
      - name: Upload macOS x86_64 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-macos-x86_64-native-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: "libs/native/jhdf5/x86_64-Mac OS X/**"
          if-no-files-found: error
      - name: Run macOS x86_64 HDF5 tests
        id: macos-x86_64-tests
        if: ${{ steps.native-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        shell: bash
        working-directory: source/c
        continue-on-error: true
        run: |
          TEST_DIR="$(find . -type d \( -path '*/hdf5-1.10.11*/build110/hict-StdShar-Clang*' -o -path '*/hdf5-1.10.11*/build110/ci-StdShar-Clang*' \) | sort | head -n 1)"
          if [[ -z "${TEST_DIR}" ]]; then
            echo "::warning::macOS x86_64 HDF5 test directory was not found; skipping tests."
            exit 0
          fi
          ctest --test-dir "${TEST_DIR}" --output-on-failure
      - name: macOS x86_64 HDF5 test warnings
        if: always() && steps.macos-x86_64-tests.outcome == 'failure'
        run: echo "::warning::macOS x86_64 HDF5 tests failed; native binary was still built and uploaded."

  package-jar:
    name: Package and publish JHDF5 jar
    needs:
      - linux-amd64
      - linux-arm64
      - windows-amd64
      - macos-arm64
      - macos-x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"
      - name: Restore packaged jar cache
        id: packaged-cache
        uses: actions/cache/restore@v5
        with:
          path: build/libs
          key: jhdf5-packaged-jar-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-hdf5-${{ env.HDF5_VERSION }}
      - name: Download native payloads
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        uses: actions/download-artifact@v6
        with:
          path: downloaded-native-payloads
          pattern: jhdf5-*-native*
      - name: Restore native payload tree
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p libs/native/jhdf5
          echo "Downloaded native payload layout:"
          find downloaded-native-payloads -maxdepth 5 -type f | sort | sed 's#^#  #' | head -n 500

          copied=0
          restore_platform_dir() {
            local src="$1"
            local name="$2"
            if [[ ! -d "${src}" ]]; then
              return 0
            fi
            echo "Restoring ${name} from ${src}"
            mkdir -p "libs/native/jhdf5/${name}"
            cp -a "${src}/." "libs/native/jhdf5/${name}/"
            copied=$((copied + 1))
          }

          while IFS= read -r -d '' src; do
            restore_platform_dir "${src}" "$(basename "${src}")"
          done < <(find downloaded-native-payloads -type d -path '*/libs/native/jhdf5/*' -print0)

          while IFS= read -r -d '' platform_dir; do
            name="$(basename "${platform_dir}")"
            case "${name}" in
              amd64-Linux|amd64-Linux-generic|amd64-Linux-avx2|amd64-Windows|amd64-Windows-generic|amd64-Windows-avx2|arm64-Linux|x86_64-Mac\ OS\ X|aarch64-Mac\ OS\ X)
                restore_platform_dir "${platform_dir}" "${name}"
                ;;
            esac
          done < <(find downloaded-native-payloads -type d -print0)

          while IFS= read -r -d '' artifact_dir; do
            artifact_name="$(basename "${artifact_dir}")"
            case "${artifact_name}" in
              jhdf5-linux-amd64-avx2-native*) restore_platform_dir "${artifact_dir}" "amd64-Linux-avx2" ;;
              jhdf5-linux-arm64-native*) restore_platform_dir "${artifact_dir}" "arm64-Linux" ;;
              jhdf5-macos-arm64-native*) restore_platform_dir "${artifact_dir}" "aarch64-Mac OS X" ;;
              jhdf5-macos-x86_64-native*) restore_platform_dir "${artifact_dir}" "x86_64-Mac OS X" ;;
              jhdf5-windows-amd64-avx2-native*) restore_platform_dir "${artifact_dir}" "amd64-Windows-avx2" ;;
              jhdf5-linux-amd64-generic-native*)
                if [[ ! -d "${artifact_dir}/amd64-Linux" && ! -d "${artifact_dir}/amd64-Linux-generic" ]]; then
                  restore_platform_dir "${artifact_dir}" "amd64-Linux"
                fi
                ;;
              jhdf5-windows-amd64-generic-native*)
                if [[ ! -d "${artifact_dir}/amd64-Windows" && ! -d "${artifact_dir}/amd64-Windows-generic" ]]; then
                  restore_platform_dir "${artifact_dir}" "amd64-Windows"
                fi
                ;;
            esac
          done < <(find downloaded-native-payloads -mindepth 1 -maxdepth 1 -type d -print0)

          if [[ -d libs/native/jhdf5/amd64-Windows-generic && ! -d libs/native/jhdf5/amd64-Windows ]]; then
            cp -a libs/native/jhdf5/amd64-Windows-generic libs/native/jhdf5/amd64-Windows
          fi
          if [[ -d libs/native/jhdf5/amd64-Linux-generic && ! -d libs/native/jhdf5/amd64-Linux ]]; then
            cp -a libs/native/jhdf5/amd64-Linux-generic libs/native/jhdf5/amd64-Linux
          fi

          echo "Restored native payload tree:"
          find libs/native/jhdf5 -maxdepth 3 -type f | sort | sed 's#^#  #' | head -n 500

          [[ ${copied} -gt 0 ]] || { echo "::error::No native payload directories were restored from downloaded artifacts."; exit 1; }
          test -f libs/native/jhdf5/amd64-Linux/libjhdf5.so
          test -f libs/native/jhdf5/amd64-Linux-avx2/libjhdf5.so
          test -f libs/native/jhdf5/arm64-Linux/libjhdf5.so
          test -f libs/native/jhdf5/amd64-Windows/jhdf5.dll
          test -f libs/native/jhdf5/amd64-Windows-avx2/jhdf5.dll
          test -f "libs/native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib"
          test -f "libs/native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib"
      - name: Use public Gradle wrapper distribution
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p gradle/wrapper
          if [[ -f gradle/wrapper/gradle-wrapper.properties ]]; then
            sed -i.bak 's#^distributionUrl=.*#distributionUrl=https\://services.gradle.org/distributions/gradle-4.9-all.zip#' gradle/wrapper/gradle-wrapper.properties
          else
            cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-4.9-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          fi
      - name: Grant execute permissions
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: chmod +x gradlew
      - name: Ensure ECJ compiler dependency
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          # Older SIS/JHDF5 Gradle files fork javac through ECJ.  Some branches
          # still point at ../jhdf5/libs/build/ecj-4.6.1.jar, which does not
          # exist in a normal GitHub Actions checkout.  Put the compiler in all
          # historical locations and keep the Maven dependency in javaproject.gradle
          # as the primary path.
          ecj_url="https://repo.maven.apache.org/maven2/org/eclipse/jdt/core/compiler/ecj/4.6.1/ecj-4.6.1.jar"
          mkdir -p libs/build ../jhdf5/libs/build
          curl -L --retry 5 --fail -o libs/build/ecj-4.6.1.jar "${ecj_url}"
          cp -f libs/build/ecj-4.6.1.jar ../jhdf5/libs/build/ecj-4.6.1.jar
          test -s libs/build/ecj-4.6.1.jar
      - name: Build JHDF5 jar
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: ./gradlew --no-daemon jar slimJar nativesTar
      - name: Stage Gradle jar outputs
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p build/libs
          # Gradle sometimes writes directly to build/libs and sometimes to
          # targets/gradle/libs.  Do not copy a file onto itself and do not let
          # a missing optional directory make this step fail under set -e.
          for dir in targets/gradle/libs build/libs; do
            [[ -d "${dir}" ]] || continue
            while IFS= read -r -d '' artifact; do
              dest="build/libs/$(basename "${artifact}")"
              if [[ "$(realpath "${artifact}")" != "$(realpath -m "${dest}")" ]]; then
                cp -f "${artifact}" "${dest}"
              fi
            done < <(find "${dir}" -maxdepth 1 -type f \( -name '*.jar' -o -name '*.pom' -o -name '*.tar.gz' \) -print0)
          done
          echo "Staged jar outputs:"
          find build/libs -maxdepth 1 -type f -print | sort
      - name: Copy variant jar payloads
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: |
          set -euo pipefail
          search_dirs=()
          [[ -d build/libs ]] && search_dirs+=(build/libs)
          [[ -d targets/gradle/libs ]] && search_dirs+=(targets/gradle/libs)
          if [[ ${#search_dirs[@]} -eq 0 ]]; then
            echo "::error::Neither build/libs nor targets/gradle/libs exists after Gradle jar task." >&2
            exit 1
          fi

          mapfile -t jar_candidates < <(
            find "${search_dirs[@]}" -maxdepth 1 -type f               -name 'sis-jhdf5-*.jar'               -not -name '*-sources.jar'               -not -name '*-javadoc.jar'               -not -name '*-h5ar-cli-*.jar'               -print | sort
          )
          if [[ ${#jar_candidates[@]} -eq 0 ]]; then
            echo "::error::Could not find primary sis-jhdf5 jar in existing Gradle output directories: ${search_dirs[*]}" >&2
            find . -path '*/libs/*.jar' -type f -print | sort >&2 || true
            exit 1
          fi
          jar_file="${jar_candidates[-1]}"
          echo "Using primary JHDF5 jar: ${jar_file}"

          pack_variant() {
            local variant="$1"
            local out_name="$2"
            local variant_dir="build/libs/.variant_pack/${variant}"
            local tmpdir="${variant_dir}/.payload"
            rm -rf "${variant_dir}"
            mkdir -p "${tmpdir}"

            (cd "${tmpdir}" && jar -xf "${GITHUB_WORKSPACE:-$(pwd)}/${jar_file#./}")

            # Be defensive: some legacy Gradle configurations do not place the
            # restored native tree into the jar automatically.  The workflow has
            # already reconstructed libs/native/jhdf5, so copy it explicitly.
            if [[ -d libs/native/jhdf5 ]]; then
              mkdir -p "${tmpdir}/libs/native"
              rm -rf "${tmpdir}/libs/native/jhdf5"
              cp -a libs/native/jhdf5 "${tmpdir}/libs/native/jhdf5"
            fi

            local stage_native="${tmpdir}/libs/native/jhdf5"
            if [[ ! -d "${stage_native}" ]]; then
              echo "::error::Jar payload has no libs/native/jhdf5 tree after explicit native copy." >&2
              exit 1
            fi

            for candidate in "${stage_native}"/*; do
              [[ -e "${candidate}" ]] || continue
              candidate_name="$(basename "${candidate}")"
              keep="false"
              case "${candidate_name}" in
                amd64-Linux|amd64-Linux-generic) [[ "${variant}" == "base" ]] && keep="true" ;;
                amd64-Linux-avx2) [[ "${variant}" == "avx2" ]] && keep="true" ;;
                amd64-Windows|amd64-Windows-generic) [[ "${variant}" == "base" ]] && keep="true" ;;
                amd64-Windows-avx2) [[ "${variant}" == "avx2" ]] && keep="true" ;;
                arm64-Linux|x86_64-Mac\ OS\ X|aarch64-Mac\ OS\ X) keep="true" ;;
              esac
              [[ "${keep}" == "true" ]] || rm -rf "${candidate}"
            done

            case "${variant}" in
              base)
                test -f "${tmpdir}/libs/native/jhdf5/amd64-Linux/libjhdf5.so"
                test -f "${tmpdir}/libs/native/jhdf5/amd64-Windows/jhdf5.dll"
                ;;
              avx2)
                test -f "${tmpdir}/libs/native/jhdf5/amd64-Linux-avx2/libjhdf5.so"
                test -f "${tmpdir}/libs/native/jhdf5/amd64-Windows-avx2/jhdf5.dll"
                ;;
            esac
            test -f "${tmpdir}/libs/native/jhdf5/arm64-Linux/libjhdf5.so"
            test -f "${tmpdir}/libs/native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib"
            test -f "${tmpdir}/libs/native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib"

            jar -cf "build/libs/${out_name}" -C "${tmpdir}" .
            rm -rf "${variant_dir}"
          }

          pack_variant base "jhdf5-base-${JHDF5_NATIVE_CACHE_VERSION}.jar"
          pack_variant avx2 "jhdf5-avx2-${JHDF5_NATIVE_CACHE_VERSION}.jar"

          # Stable aliases make downstream HiCT_JVM workflows easy to configure,
          # while the versioned files remain available for manual override/cache busting.
          cp -f "build/libs/jhdf5-base-${JHDF5_NATIVE_CACHE_VERSION}.jar" "build/libs/sis-jhdf5-19.04.1.jar"
          cp -f "build/libs/jhdf5-avx2-${JHDF5_NATIVE_CACHE_VERSION}.jar" "build/libs/sis-jhdf5-19.04.1-avx2.jar"
          slim_candidate="$(find build/libs targets/gradle/libs -maxdepth 1 -type f -name 'sis-jhdf5-*-slim.jar' 2>/dev/null | sort | tail -n 1 || true)"
          if [[ -n "${slim_candidate}" && -f "${slim_candidate}" ]]; then
            if [[ "$(realpath "${slim_candidate}")" != "$(realpath -m build/libs/sis-jhdf5-19.04.1-slim.jar)" ]]; then
              cp -f "${slim_candidate}" "build/libs/sis-jhdf5-19.04.1-slim.jar"
            fi
          else
            echo "::warning::Gradle did not produce a slim JHDF5 jar; split downstream packaging will use the legacy fat jar."
          fi
          natives_candidate="$(find build/libs targets/gradle/libs -maxdepth 1 -type f -name 'sis-jhdf5-*-natives.tar.gz' 2>/dev/null | sort | tail -n 1 || true)"
          if [[ -n "${natives_candidate}" && -f "${natives_candidate}" ]]; then
            if [[ "$(realpath "${natives_candidate}")" != "$(realpath -m build/libs/sis-jhdf5-19.04.1-natives.tar.gz)" ]]; then
              cp -f "${natives_candidate}" "build/libs/sis-jhdf5-19.04.1-natives.tar.gz"
            fi
          else
            echo "::warning::Gradle did not produce a JHDF5 natives tarball; split downstream packaging will use the legacy fat jar."
          fi
          echo "Packaged JHDF5 jars:"
          find build/libs -maxdepth 1 -type f -name '*.jar' -print | sort
          find build/libs -maxdepth 1 -type f -name '*.tar.gz' -print | sort
      - name: Write checksum
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for jar_path in build/libs/*.jar; do
            sha256sum "${jar_path}" > "${jar_path}.sha256"
          done
          for archive_path in build/libs/*.tar.gz; do
            sha256sum "${archive_path}" > "${archive_path}.sha256"
          done
      - name: Save packaged jar cache
        if: ${{ steps.packaged-cache.outputs.cache-hit != 'true' || env.JHDF5_FORCE_NATIVE_REBUILD == 'true' }}
        uses: actions/cache/save@v5
        with:
          path: build/libs
          key: jhdf5-packaged-jar-${{ env.JHDF5_NATIVE_CACHE_VERSION }}-hdf5-${{ env.HDF5_VERSION }}
      - name: Upload packaged jar artifact
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-packaged-jar-${{ env.JHDF5_NATIVE_CACHE_VERSION }}
          path: |
            build/libs/*.jar
            build/libs/*.tar.gz
            build/libs/*.sha256
          if-no-files-found: error
      - name: Validate packaged jar
        run: |
          set -euo pipefail
          jar_path="build/libs/jhdf5-base-${JHDF5_NATIVE_CACHE_VERSION}.jar"
          if [[ ! -f "${jar_path}" ]]; then
            jar_path="build/libs/sis-jhdf5-19.04.1.jar"
          fi
          if [[ ! -f "${jar_path}" ]]; then
            echo "Could not find packaged base jar." >&2
            find build/libs -maxdepth 1 -type f -print | sort >&2 || true
            exit 1
          fi
          echo "Validating ${jar_path}"
          jar tf "${jar_path}" | grep -q '^libs/native/jhdf5/amd64-Linux/libjhdf5.so$\|^native/jhdf5/amd64-Linux/libjhdf5.so$'
          jar tf "${jar_path}" | grep -q '^libs/native/jhdf5/arm64-Linux/libjhdf5.so$\|^native/jhdf5/arm64-Linux/libjhdf5.so$'
          jar tf "${jar_path}" | grep -q '^libs/native/jhdf5/amd64-Windows/jhdf5.dll$\|^native/jhdf5/amd64-Windows/jhdf5.dll$'
          jar tf "${jar_path}" | grep -q '^libs/native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib$\|^native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib$'
          jar tf "${jar_path}" | grep -q '^libs/native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib$\|^native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib$'
          avx2_path="build/libs/jhdf5-avx2-${JHDF5_NATIVE_CACHE_VERSION}.jar"
          if [[ -f "${avx2_path}" ]]; then
            echo "Validating ${avx2_path}"
            jar tf "${avx2_path}" | grep -q '^libs/native/jhdf5/amd64-Linux-avx2/libjhdf5.so$\|^native/jhdf5/amd64-Linux-avx2/libjhdf5.so$'
            jar tf "${avx2_path}" | grep -q '^libs/native/jhdf5/amd64-Windows-avx2/jhdf5.dll$\|^native/jhdf5/amd64-Windows-avx2/jhdf5.dll$'
          fi
          slim_path="build/libs/sis-jhdf5-19.04.1-slim.jar"
          natives_path="build/libs/sis-jhdf5-19.04.1-natives.tar.gz"
          if [[ -f "${slim_path}" && -f "${natives_path}" ]]; then
            echo "Validating split artifacts ${slim_path} + ${natives_path}"
            ! jar tf "${slim_path}" | grep -q '^native/jhdf5/\|^libs/native/jhdf5/' || {
              echo "Slim JHDF5 jar unexpectedly contains native payloads." >&2
              exit 1
            }
            tar -tzf "${natives_path}" | grep -q '^native/jhdf5/amd64-Linux/libjhdf5.so$'
            tar -tzf "${natives_path}" | grep -q '^native/jhdf5/arm64-Linux/libjhdf5.so$'
            tar -tzf "${natives_path}" | grep -q '^native/jhdf5/amd64-Windows/jhdf5.dll$'
            tar -tzf "${natives_path}" | grep -q '^native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib$'
            tar -tzf "${natives_path}" | grep -q '^native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib$'
          else
            echo "::warning::Split JHDF5 artifacts are incomplete; legacy fat jar artifacts remain available."
          fi
      - name: Publish jar to GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            build/libs/*.tar.gz
            build/libs/*.sha256
