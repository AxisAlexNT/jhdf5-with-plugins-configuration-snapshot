name: Build JHDF5 natives and jar

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  release:
    types: [published]

permissions:
  contents: write

env:
  HDF5_CMAKE_ARCHIVE_URL: https://support.hdfgroup.org/ftp/HDF5/releases/hdf5-1.10/hdf5-1.10.11/src/CMake-hdf5-1.10.11.zip
  HDF5_CMAKE_ARCHIVE_NAME: CMake-hdf5-1.10.11.zip

jobs:
  linux-amd64:
    name: Linux amd64 natives
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Download HDF5 CMake archive
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build Linux amd64 variants
        run: ./source/c/build_linux_manylinux.sh amd64 generic avx2
      - name: Smoke-check native payload
        run: test -f libs/native/jhdf5/amd64-Linux/libjhdf5.so
      - name: Upload Linux amd64 generic native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-linux-amd64-generic-native
          path: |
            libs/native/jhdf5/amd64-Linux/**
            libs/native/jhdf5/amd64-Linux-generic/**
          if-no-files-found: error
      - name: Upload Linux amd64 avx2 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-linux-amd64-avx2-native
          path: libs/native/jhdf5/amd64-Linux-avx2/**
          if-no-files-found: error

  linux-arm64:
    name: Linux arm64 natives
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Download HDF5 CMake archive
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build Linux arm64 payload
        run: ./source/c/build_linux_manylinux.sh arm64
      - name: Smoke-check native payload
        run: test -f libs/native/jhdf5/arm64-Linux/libjhdf5.so
      - name: Upload Linux arm64 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-linux-arm64-native
          path: libs/native/jhdf5/arm64-Linux/**
          if-no-files-found: error

  windows-amd64:
    name: Windows amd64 natives
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Download HDF5 CMake archive
        shell: pwsh
        working-directory: source\c
        run: Invoke-WebRequest -Uri $env:HDF5_CMAKE_ARCHIVE_URL -OutFile $env:HDF5_CMAKE_ARCHIVE_NAME
      - name: Grant execute permissions
        shell: pwsh
        run: |
          if (-not (Test-Path gradlew.bat)) {
            throw "gradlew.bat was not found."
          }
      - name: Build Windows amd64 variants
        shell: pwsh
        working-directory: source\c
        run: .\build_windows_amd64_variants.ps1 -Variants generic,avx2,avx512
      - name: Smoke-check native payload
        shell: pwsh
        run: Test-Path libs\native\jhdf5\amd64-Windows\jhdf5.dll
      - name: Upload Windows amd64 generic native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-windows-amd64-generic-native
          path: |
            libs/native/jhdf5/amd64-Windows/**
            libs/native/jhdf5/amd64-Windows-generic/**
          if-no-files-found: error
      - name: Upload Windows amd64 avx2 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-windows-amd64-avx2-native
          path: libs/native/jhdf5/amd64-Windows-avx2/**
          if-no-files-found: error
      - name: Upload Windows amd64 avx512 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-windows-amd64-avx512-native
          path: libs/native/jhdf5/amd64-Windows-avx512/**
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64 natives
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install CMake and Fortran toolchain
        run: |
          brew update
          brew install cmake gcc
          echo "$(brew --prefix gcc)/bin" >> "$GITHUB_PATH"
          gfortran_path="$(command -v gfortran || command -v gfortran-14 || true)"
          if [[ -z "${gfortran_path}" ]]; then
            echo "::error::gfortran was not found after installing gcc." >&2
            exit 1
          fi
          echo "FC=${gfortran_path}" >> "$GITHUB_ENV"
      - name: Download HDF5 CMake archive
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build macOS arm64 payload
        working-directory: source/c
        run: |
          ./compile_hdf5_macosx_aarch64.sh
          ./compile_macosx_aarch64.sh
      - name: Smoke-check native payload
        run: test -f "libs/native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib"
      - name: Upload macOS arm64 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-macos-arm64-native
          path: "libs/native/jhdf5/aarch64-Mac OS X/**"
          if-no-files-found: error

  macos-x86_64:
    name: macOS x86_64 natives
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Install CMake and Fortran toolchain
        run: |
          brew update
          brew install cmake gcc
          echo "$(brew --prefix gcc)/bin" >> "$GITHUB_PATH"
          gfortran_path="$(command -v gfortran || command -v gfortran-14 || true)"
          if [[ -z "${gfortran_path}" ]]; then
            echo "::error::gfortran was not found after installing gcc." >&2
            exit 1
          fi
          echo "FC=${gfortran_path}" >> "$GITHUB_ENV"
      - name: Download HDF5 CMake archive
        working-directory: source/c
        run: curl -L --retry 5 --fail -o "${HDF5_CMAKE_ARCHIVE_NAME}" "${HDF5_CMAKE_ARCHIVE_URL}"
      - name: Grant execute permissions
        run: chmod +x gradlew source/c/*.sh
      - name: Build macOS x86_64 payload
        working-directory: source/c
        run: |
          ./compile_hdf5_macosx_x86_64.sh
          ./compile_macosx_x86_64.sh
      - name: Smoke-check native payload
        run: test -f "libs/native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib"
      - name: Upload macOS x86_64 native payload
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-macos-x86_64-native
          path: "libs/native/jhdf5/x86_64-Mac OS X/**"
          if-no-files-found: error

  package-jar:
    name: Package and publish JHDF5 jar
    needs:
      - linux-amd64
      - linux-arm64
      - windows-amd64
      - macos-arm64
      - macos-x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Download native payloads
        uses: actions/download-artifact@v6
        with:
          path: downloaded-native-payloads
      - name: Restore native payload tree
        run: |
          set -euo pipefail
          find downloaded-native-payloads -type d -path '*/libs/native/jhdf5' -print0 |
            while IFS= read -r -d '' src; do
              cp -a "${src}/." libs/native/jhdf5/
            done

      - name: Grant execute permissions
        run: chmod +x gradlew
      - name: Build JHDF5 jar
        run: ./gradlew jar
      - name: Copy variant jar payloads
        run: |
          set -euo pipefail
          jar_file="$(find build/libs -maxdepth 1 -type f -name 'sis-jhdf5-*.jar' -not -name '*-sources.jar' -not -name '*-javadoc.jar' -not -name '*-h5ar-cli-*.jar' | sort | tail -n 1)"
          if [[ -z "${jar_file}" ]]; then
            echo "Could not find primary sis-jhdf5 jar in build/libs" >&2
            exit 1
          fi

          for variant in base avx2 avx512; do
            variant_dir="build/libs/.variant_pack/${variant}"
            mkdir -p "${variant_dir}"
            rm -rf "${variant_dir:?}/.payload"
            mkdir -p "${variant_dir}/.payload"
            tmpdir="${variant_dir}/.payload"
            (cd "${tmpdir}" && jar -xf "${GITHUB_WORKSPACE:-$(pwd)}/${jar_file#./}")
            stage_native="${tmpdir}/libs/native/jhdf5"
            if [[ -d "${stage_native}" ]]; then
              if compgen -G "${stage_native}/*" > /dev/null; then
                for candidate in "${stage_native}"/*; do
                  candidate_name="$(basename "${candidate}")"
                  case "${candidate_name}" in
                    amd64-Linux|amd64-Linux-avx2|amd64-Linux-avx512)
                      keep="true"
                      if [[ "${variant}" == "base" && "${candidate_name}" != "amd64-Linux" ]]; then
                        keep="false"
                      elif [[ "${variant}" == "avx2" && "${candidate_name}" != "amd64-Linux-avx2" ]]; then
                        keep="false"
                      elif [[ "${variant}" == "avx512" && "${candidate_name}" != "amd64-Linux-avx512" ]]; then
                        keep="false"
                      fi
                      ;;
                    amd64-Windows|amd64-Windows-generic|amd64-Windows-avx2|amd64-Windows-avx512)
                      keep="false"
                      if [[ "${variant}" == "base" && "${candidate_name}" == "amd64-Windows" ]]; then
                        keep="true"
                      elif [[ "${variant}" == "base" && "${candidate_name}" == "amd64-Windows-generic" ]]; then
                        keep="true"
                      elif [[ "${variant}" == "avx2" && "${candidate_name}" == "amd64-Windows-avx2" ]]; then
                        keep="true"
                      elif [[ "${variant}" == "avx512" && "${candidate_name}" == "amd64-Windows-avx512" ]]; then
                        keep="true"
                      fi
                      ;;
                    arm64-Linux|x86_64-Mac\ OS\ X|aarch64-Mac\ OS\ X)
                      keep="true"
                      ;;
                    *)
                      keep="false"
                      ;;
                  esac
                  if [[ "${keep}" == "false" ]]; then
                    rm -rf "${candidate}"
                  fi
                done
              fi
            fi
            case "${variant}" in
              base)
                if [[ ! -d "${tmpdir}/libs/native/jhdf5/amd64-Linux" ]]; then
                  echo "Skipping ${variant} jar: amd64-Linux missing."
                  continue
                fi
                ;;
              avx2)
                if [[ ! -d "${tmpdir}/libs/native/jhdf5/amd64-Linux-avx2" ]]; then
                  echo "Skipping ${variant} jar: amd64-Linux-avx2 missing."
                  continue
                fi
                ;;
              avx512)
                if [[ ! -d "${tmpdir}/libs/native/jhdf5/amd64-Linux-avx512" ]]; then
                  echo "Skipping ${variant} jar: amd64-Linux-avx512 missing."
                  continue
                fi
                ;;
            esac
            jar -cf "build/libs/jhdf5-${variant}.jar" -C "${tmpdir}" .
            rm -rf "${variant_dir}/.payload"
          done

      - name: Validate packaged jar
        run: |
          jar_path="$(find build/libs -maxdepth 1 -type f -name 'sis-jhdf5-*.jar' -not -name '*-sources.jar' -not -name '*-javadoc.jar' -not -name '*-h5ar-cli-*.jar' | sort | tail -n 1)"
          if [[ -z "${jar_path}" ]]; then
            echo "Could not find packaged main sis-jhdf5 jar." >&2
            exit 1
          fi
          jar tf "${jar_path}" | grep -q '^native/jhdf5/amd64-Linux/libjhdf5.so$'
          jar tf "${jar_path}" | grep -q '^native/jhdf5/arm64-Linux/libjhdf5.so$'
          jar tf "${jar_path}" | grep -q '^native/jhdf5/amd64-Windows/jhdf5.dll$'
          jar tf "${jar_path}" | grep -q '^native/jhdf5/aarch64-Mac OS X/libjhdf5.jnilib$'
          jar tf "${jar_path}" | grep -q '^native/jhdf5/x86_64-Mac OS X/libjhdf5.jnilib$'
          jar tf "${jar_path}" | grep -q '^resources/libs/osx_arm64/libhdf5.dylib$'
          jar tf "${jar_path}" | grep -q '^resources/libs/osx_64/libhdf5.dylib$'
          jar tf "${jar_path}" | grep -q '^resources/libs/osx_arm64/libh5bshuf.dylib$'
          jar tf "${jar_path}" | grep -q '^resources/libs/osx_64/libh5bshuf.dylib$'
      - name: Write checksum
        run: |
          for jar_path in build/libs/jhdf5-*.jar; do
            sha256sum "${jar_path}" > "${jar_path}.sha256"
          done
      - name: Upload packaged jar artifact
        uses: actions/upload-artifact@v6
        with:
          name: jhdf5-packaged-jar
          path: |
            build/libs/*.jar
            build/libs/*.sha256
          if-no-files-found: error
      - name: Publish jar to GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            build/libs/*.sha256
